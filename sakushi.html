<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>錯視調整ゲーム </title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #e0e0e0; margin: 0; padding: 20px; }
        canvas { background: white; border: 4px solid #333; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .info { margin: 10px; font-weight: bold; min-height: 1.2em; }
        #stage-title { font-size: 1.5em; margin-bottom: 5px; }
        .controls { color: #666; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="stage-title">Stage 1: ミュラー・リヤー錯視</div>
    <div id="message" class="info">同じ長さ・大きさ・一直線に見えるよう調整してください</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div id="ui-controls" class="controls">[←][→] または [↑][↓] で調整 / [Enter] で判定</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const titleEl = document.getElementById('stage-title');
        const msgEl = document.getElementById('message');

        let stage = 0;
        let playerValue = 150;
        let isJudging = false;
        let isFinished = false;
        let animProgress = 0;
        const results = [];

        const stages = [
            { name: "ミュラー・リヤー錯視", target: 200, unit: "px", init: 150 },
            { name: "エビングハウス錯視", target: 30, unit: "px", init: 50 },
            { name: "明るさの対比", target: 128, unit: "値", init: 180 },
            { name: "ホワイト効果", target: 120, unit: "値", init: 80 },
            { name: "正方形・ダイヤモンド錯視", target: 100, unit: "px", init: 85 },
            { name: "ポッゲンドルフ錯視", target: 120, unit: "px", init: 180 } 
        ];

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (isFinished) { drawResult(); return; }

            const s = stages[stage];
            const p = animProgress;

            // --- Stage 1 - 4 ---
            if (stage === 0) {
                const startX = 250;
                drawArrowLine(startX, 150 + (p * 45), s.target, false); 
                drawArrowLine(startX, 250 - (p * 45), playerValue, true);
                if (isJudging && p >= 0.9) drawVerticalLine(startX, s.target);
            } 
            else if (stage === 1) {
                const leftX = 250 + (p * 150);
                const rightX = 550 - (p * 150);
                drawFlower(leftX, 200, s.target, 45, 6);
                drawFlower(rightX, 200, playerValue, 15, 8);
                if (isJudging && p >= 0.9) drawVerticalLine(400 - s.target, s.target * 2);
            }
            else if (stage === 2) {
                ctx.globalAlpha = 1 - p;
                ctx.fillStyle = "#333"; ctx.fillRect(100, 100, 250, 200);
                ctx.fillStyle = "#eee"; ctx.fillRect(450, 100, 250, 200);
                ctx.globalAlpha = 1;
                ctx.fillStyle = `rgb(${s.target},${s.target},${s.target})`; ctx.fillRect(200 + (p * 150), 175, 50, 50);
                ctx.fillStyle = `rgb(${playerValue},${playerValue},${playerValue})`; ctx.fillRect(550 - (p * 150), 175, 50, 50);
            }
            else if (stage === 3) {
                ctx.fillStyle = `rgb(${s.target},${s.target},${s.target})`; ctx.fillRect(150 + (p * 150), 140, 100, 120);
                ctx.fillStyle = `rgb(${playerValue},${playerValue},${playerValue})`; ctx.fillRect(550 - (p * 150), 140, 100, 120);
                if (p < 0.8) {
                    ctx.globalAlpha = 1 - p;
                    for(let i=0; i<10; i++) {
                        ctx.fillStyle = "black"; ctx.fillRect(150 + i*20, 100, 10, 200);
                        ctx.fillStyle = "white"; ctx.fillRect(500 + i*20, 100, 10, 200);
                    }
                    ctx.globalAlpha = 1;
                }
            }
            // --- Stage 5---
            else if (stage === 4) {
                const leftX = 200 + (p * (400 - s.target/2 - 200));
                const rightX = 600 - (p * (600 - (400 + playerValue/2)));
                const angle = (Math.PI / 4) * (1 - p);
                drawRect(leftX, 200, s.target, 0);
                drawRect(rightX, 200, playerValue, angle); 
                if (isJudging && p >= 0.9) drawVerticalLine(400 - s.target, s.target);
            }
            // --- Stage 6---
            else if (stage === 5) {
                const lx = 350, rx = 450;
                const sy = 280, ey = 200; // 左線の座標
                const tx = rx, ty = 120; // ターゲット(正解)座標

                // 1. 赤い点線 (左の線 始点(250, 280)からターゲット(450, 120)を通る直線)
                if (isJudging) {
                    ctx.save();
                    ctx.strokeStyle = "red"; ctx.setLineDash([5, 5]); ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(lx - 100, sy); 
                    ctx.lineTo(rx + 100, 40); // 右端まで一直線に
                    ctx.stroke();
                    ctx.restore();
                }

                // 2. 線の描画
                ctx.strokeStyle = "#333"; ctx.lineWidth = 3;
                ctx.beginPath(); // 左の線 (固定)
                ctx.moveTo(lx - 100, sy); ctx.lineTo(lx, ey); ctx.stroke();
                
                ctx.beginPath(); // 右の線 (プレイヤーが上下に動かす)
                ctx.moveTo(rx, playerValue); ctx.lineTo(rx + 100, playerValue - 80); ctx.stroke();

                // 3. 中央の壁 (判定時に消去)
                if (p < 1) {
                    ctx.save();
                    ctx.globalAlpha = 1 - p;
                    ctx.fillStyle = "#333"; ctx.fillRect(lx, 100, 100, 200);
                    ctx.restore();
                }
            }

            if (isJudging && p >= 1) {
                ctx.fillStyle = "red"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(`正解位置: ${s.target} / あなた: ${Math.round(playerValue)}`, 400, 50);
            }
        }

        // --- 補助関数 ---
        function drawVerticalLine(x, w) {
            ctx.save(); ctx.strokeStyle = "rgba(255, 0, 0, 0.5)"; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(x, 50); ctx.lineTo(x, 350); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + w, 50); ctx.lineTo(x + w, 350); ctx.stroke();
            ctx.restore();
        }

        function drawRect(x, y, size, angle) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
            ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.strokeRect(-size/2, -size/2, size, size); ctx.restore();
        }

        function drawArrowLine(startX, y, len, outward) {
            ctx.strokeStyle = "#333"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(startX + len, y);
            const wing = 20, ang = Math.PI / 6, dir = outward ? 1 : -1;
            ctx.moveTo(startX, y); ctx.lineTo(startX + Math.cos(ang)*wing*dir, y - Math.sin(ang)*wing);
            ctx.moveTo(startX, y); ctx.lineTo(startX + Math.cos(ang)*wing*dir, y + Math.sin(ang)*wing);
            ctx.moveTo(startX + len, y); ctx.lineTo(startX + len - Math.cos(ang)*wing*dir, y - Math.sin(ang)*wing);
            ctx.moveTo(startX + len, y); ctx.lineTo(startX + len - Math.cos(ang)*wing*dir, y + Math.sin(ang)*wing);
            ctx.stroke();
        }

        function drawFlower(x, y, r, sr, count) {
            ctx.fillStyle = "#ffaa00"; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
            if (animProgress < 0.5) {
                ctx.globalAlpha = 1 - (animProgress * 2); ctx.fillStyle = "#999";
                for(let i=0; i<count; i++) {
                    const a = (Math.PI*2/count)*i;
                    ctx.beginPath(); ctx.arc(x+Math.cos(a)*(r+sr+10), y+Math.sin(a)*(r+sr+10), sr, 0, Math.PI*2); ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        }

        function drawResult() {
            titleEl.innerText = "テスト結果";
            ctx.fillStyle = "#333"; ctx.textAlign = "center"; ctx.font = "bold 20px sans-serif";
            let total = 0;
            results.forEach((res, i) => {
                ctx.fillText(`${stages[i].name}: 誤差 ${res.toFixed(1)}`, 400, 100 + i * 40);
                total += res;
            });
            ctx.fillStyle = "#d32f2f"; ctx.font = "bold 32px sans-serif";
            ctx.fillText(`合計ズレ: ${total.toFixed(1)}`, 400, 360);
        }

        function update() {
            if (isJudging && animProgress < 1) {
                animProgress += 0.015; draw();
                requestAnimationFrame(update);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (isFinished) return;
            if (isJudging && animProgress >= 1) {
                if (e.key === 'Enter') {
                    results.push(Math.abs(playerValue - stages[stage].target));
                    if (stage < stages.length - 1) {
                        stage++; playerValue = stages[stage].init;
                        isJudging = false; animProgress = 0;
                        titleEl.innerText = `Stage ${stage + 1}: ${stages[stage].name}`;
                        draw();
                    } else { isFinished = true; draw(); }
                }
                return;
            }
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { playerValue += 1; draw(); }
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { playerValue -= 1; draw(); }
            if (e.key === 'Enter' && !isJudging) { isJudging = true; update(); }
        });

        draw();
    </script>
</body>
</html>
